server:
  port: 8080

spring:
  application:
    name: nyeuni
  datasource:
    url: jdbc:h2:mem:unidb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-edzesek